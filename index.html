<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ══════════════════════════════════════════════
       META — PWA / GitHub Pages ready
  ═════════════════════════════════════════════════ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1b3e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BUK Nav" />
  <meta name="description" content="Interactive satellite campus navigation for Bayero University Kano (BUK) Old Site." />
  <meta property="og:title" content="BUK Navigate — Old Site" />
  <meta property="og:description" content="Satellite campus map for Bayero University Kano." />
  <meta property="og:type" content="website" />
  <title>BUK Navigate — Old Site</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════════
       DESIGN TOKENS — DARK MODE (default)
    ═════════════════════════════════════════════════ */
    :root {
      --maroon:        #7b1d2e;
      --maroon-b:      #a8293e;
      --gold:          #c9973a;
      --gold-soft:     rgba(201,151,58,0.13);
      --gold-ring:     rgba(201,151,58,0.45);
      --neon:          #ccff00;
      --neon-glow:     rgba(204,255,0,0.35);
      --blue-dot:      #1976d2;

      --bg:            #0e1118;
      --surface:       #161b26;
      --surface-alt:   #1e2436;
      --surface-raised:#252d44;

      --border:        rgba(255,255,255,0.08);
      --glass:         rgba(14,17,24,0.90);
      --header-bg:     rgba(10,13,22,0.96);

      --text-primary:  #e4e8f0;
      --text-secondary:#8a94b0;
      --text-on-brand: #ffffff;
      --text-muted:    #5a6280;

      --ctrl-bg:       rgba(22,27,38,0.95);
      --ctrl-border:   rgba(255,255,255,0.09);
      --ctrl-icon:     #c8d0e8;

      --dropdown-bg:   #161b26;
      --dropdown-hover:rgba(255,255,255,0.05);
      --dropdown-div:  rgba(255,255,255,0.04);

      --legend-text:   #b0bcd8;

      --panel-bg:      #161b26;
      --panel-tab-active:      #252d44;
      --panel-tab-text:        #8a94b0;
      --panel-tab-active-text: #e4e8f0;
      --chip-bg:       #1e2436;
      --chip-border:   rgba(255,255,255,0.06);

      --card-bg:       rgba(204,255,0,0.06);
      --card-border:   rgba(204,255,0,0.18);

      --res-bg:        rgba(255,255,255,0.04);
      --res-border:    rgba(255,255,255,0.07);
      --res-hover:     rgba(255,255,255,0.08);

      --toast-bg:      #252d44;
      --toast-text:    #e4e8f0;
      --toast-border:  rgba(255,255,255,0.09);

      --err-bg:        #1e1014;
      --err-border:    rgba(168,41,62,0.45);
      --err-text:      #f4a0a0;

      --admin-bg:      rgba(201,151,58,0.16);
      --admin-border:  rgba(201,151,58,0.55);
      --admin-text:    #f0c060;

      --scroll-thumb:  rgba(255,255,255,0.12);
      /* Satellite tiles are always shown; dark mode dims the UI only.
         A very subtle overlay hint makes the satellite feel "night mode" */
      --map-overlay:   rgba(0,0,20,0.18);

      --radius:    14px;
      --radius-lg: 20px;
      --shadow:    0 8px 28px rgba(0,0,0,0.55);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.70);
      --ease:      cubic-bezier(0.4,0,0.2,1);
    }

    /* ══════════════════════════════════════════════
       LIGHT MODE — UI panels only
       Satellite tiles are unchanged; only chrome flips.
    ═════════════════════════════════════════════════ */
    body.light {
      --bg:            #edf0f8;
      --surface:       #ffffff;
      --surface-alt:   #edf0f8;
      --surface-raised:#dde3f4;
      --border:        rgba(13,27,62,0.10);
      --glass:         rgba(237,240,248,0.93);
      --header-bg:     rgba(10,18,48,0.97);
      --text-primary:  #0d1b3e;
      --text-secondary:#4a5580;
      --text-muted:    #7a85a8;
      --ctrl-bg:       rgba(255,255,255,0.96);
      --ctrl-border:   rgba(13,27,62,0.13);
      --ctrl-icon:     #0d1b3e;
      --dropdown-bg:   #ffffff;
      --dropdown-hover:rgba(13,27,62,0.05);
      --dropdown-div:  rgba(13,27,62,0.05);
      --legend-text:   #2a3a6a;
      --panel-bg:      #ffffff;
      --panel-tab-active:      #0d1b3e;
      --panel-tab-text:        #4a5580;
      --panel-tab-active-text: #ffffff;
      --chip-bg:       #edf0f8;
      --chip-border:   rgba(13,27,62,0.09);
      --card-bg:       rgba(100,160,0,0.07);
      --card-border:   rgba(100,160,0,0.22);
      --res-bg:        rgba(13,27,62,0.04);
      --res-border:    rgba(13,27,62,0.09);
      --res-hover:     rgba(13,27,62,0.08);
      --toast-bg:      #0d1b3e;
      --toast-text:    #ffffff;
      --toast-border:  rgba(255,255,255,0.14);
      --err-bg:        #fff0f0;
      --err-border:    rgba(168,41,62,0.26);
      --err-text:      #7b1d2e;
      --admin-bg:      rgba(120,80,0,0.10);
      --admin-border:  rgba(140,95,0,0.50);
      --admin-text:    #7a5000;
      --scroll-thumb:  rgba(13,27,62,0.14);
      --map-overlay:   transparent;
    }

    /* ══════════════════════════════════════════════
       BASE
    ═════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text-primary);
      padding-top: env(safe-area-inset-top);
    }

    /* ══════════════════════════════════════════════
       MAP
    ═════════════════════════════════════════════════ */
    #map { position: absolute; inset: 0; z-index: 0; }
    /* Dark-mode tint overlay — sits above satellite tiles, below Leaflet markers */
    #map-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: var(--map-overlay);
      pointer-events: none;
      transition: background 0.45s var(--ease);
    }
    body.admin-mode #map { cursor: crosshair !important; }

    /* ══════════════════════════════════════════════
       LEAFLET CHROME OVERRIDES
    ═════════════════════════════════════════════════ */
    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution {
      background: var(--glass) !important;
      color: var(--text-secondary) !important;
      font-size: 10px !important;
      backdrop-filter: blur(8px);
      border-radius: 8px 0 0 0 !important;
      padding: 3px 8px !important;
      border-top: 1px solid var(--border) !important;
    }
    .leaflet-control-attribution a { color: var(--neon) !important; }
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important; color: var(--text-primary) !important;
      border-radius: var(--radius) !important; box-shadow: var(--shadow) !important;
      border: 1px solid var(--border) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }

    /* ══════════════════════════════════════════════
       ZOOM-DEPENDENT BUILDING LABELS
       Over satellite, we always use the dark-text-on-
       bright-halo variant since the tiles are photographic.
    ═════════════════════════════════════════════════ */
    .buk-label-wrap {
      background: transparent !important;
      border: none !important;
      overflow: visible !important;
    }
    .buk-label {
      display: inline-block;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #ffffff;
      /* Heavy halo — readable over any satellite texture */
      text-shadow:
        -1.5px -1.5px 0 rgba(0,0,0,1),
         1.5px -1.5px 0 rgba(0,0,0,1),
        -1.5px  1.5px 0 rgba(0,0,0,1),
         1.5px  1.5px 0 rgba(0,0,0,1),
         0      0     5px rgba(0,0,0,0.95),
         0      0    10px rgba(0,0,0,0.70),
         0      0    16px rgba(0,0,0,0.45);
      opacity: 0;
      transition: opacity 0.38s var(--ease);
    }
    .buk-label.visible { opacity: 1; }
    /* Light mode UI: labels on satellite are still white-on-black-halo
       because the tiles don't change. No override needed. */

    /* ══════════════════════════════════════════════
       ENTRANCE DOT — activated building entrance pin
    ═════════════════════════════════════════════════ */
    .entrance-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2.5px solid #ffffff;
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.4),
        0 3px 12px rgba(0,0,0,0.6);
    }

    /* ══════════════════════════════════════════════
       SEARCH PULSE MARKER — neon ring on search
    ═════════════════════════════════════════════════ */
    @keyframes search-ring {
      0%   { transform: scale(1);   opacity: 0.85; }
      65%  { transform: scale(3.4); opacity: 0; }
      100% { transform: scale(3.4); opacity: 0; }
    }
    .sp-wrap { position: relative; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
    .sp-ring { position: absolute; width: 18px; height: 18px; border-radius: 50%; animation: search-ring 1.7s ease-out infinite; }
    .sp-core { position: relative; z-index: 1; width: 12px; height: 12px; border-radius: 50%; border: 2.5px solid #ffffff; box-shadow: 0 2px 12px rgba(0,0,0,0.70); }

    /* ══════════════════════════════════════════════
       BLUE PULSE DOT (live location)
    ═════════════════════════════════════════════════ */
    @keyframes blue-ring {
      0%   { transform: scale(1);   opacity: 0.75; }
      70%  { transform: scale(2.8); opacity: 0; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    .bd-wrap { position: relative; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
    .bd-ring { position: absolute; width: 20px; height: 20px; border-radius: 50%; background: rgba(25,118,210,0.40); animation: blue-ring 2.2s ease-out infinite; }
    .bd-core { position: relative; z-index: 1; width: 14px; height: 14px; border-radius: 50%; background: #1976d2; border: 2.5px solid #ffffff; box-shadow: 0 2px 10px rgba(25,118,210,0.70); }

    /* Admin coord pin */
    .admin-pin { width: 12px; height: 12px; border-radius: 50%; background: var(--gold); border: 2px solid #ffffff; box-shadow: 0 2px 8px rgba(201,151,58,0.8); }

    /* ══════════════════════════════════════════════
       HEADER
    ═════════════════════════════════════════════════ */
    #header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 900;
      padding: 14px 14px 0;
      padding-top: calc(14px + env(safe-area-inset-top));
    }
    .header-row { display: flex; align-items: center; gap: 10px; }

    .logo {
      display: flex; align-items: center; gap: 9px;
      background: var(--maroon); color: var(--text-on-brand);
      padding: 9px 15px; border-radius: 50px;
      flex-shrink: 0; box-shadow: var(--shadow);
      text-decoration: none; user-select: none;
    }
    .logo-mark { font-size: 18px; line-height: 1; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; line-height: 1; }
    .logo-sub  { font-size: 9px; font-weight: 300; opacity: 0.60; letter-spacing: 0.09em; text-transform: uppercase; }

    .search-wrap { flex: 1; position: relative; }
    #search-input {
      width: 100%; background: var(--header-bg);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1.5px solid rgba(255,255,255,0.10); color: var(--text-on-brand);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 11px 44px 11px 18px; border-radius: 50px; outline: none;
      box-shadow: var(--shadow); transition: border-color 0.3s;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.35); opacity: 1; }
    #search-input:focus { border-color: var(--gold-ring); }
    .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: rgba(255,255,255,0.40); }
    .search-icon svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .hdr-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .hdr-btn {
      height: 40px; padding: 0 13px; border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.12); background: var(--header-bg);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      color: var(--text-on-brand);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      box-shadow: var(--shadow); transition: background 0.2s, border-color 0.2s; white-space: nowrap;
    }
    .hdr-btn:hover { background: rgba(25,40,90,0.98); border-color: rgba(255,255,255,0.22); }
    .hdr-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #theme-btn { padding: 0 11px; }

    /* ══════════════════════════════════════════════
       ADMIN BADGE
    ═════════════════════════════════════════════════ */
    #admin-badge {
      display: none; pointer-events: none;
      position: absolute;
      top: calc(72px + env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      z-index: 910;
      background: var(--admin-bg); border: 1.5px solid var(--admin-border); color: var(--admin-text);
      font-size: 11px; font-weight: 700; padding: 6px 16px; border-radius: 50px;
      letter-spacing: 0.07em; text-transform: uppercase;
      backdrop-filter: blur(12px); white-space: nowrap;
      animation: badge-glow 3s ease-in-out infinite;
    }
    #admin-badge.visible { display: flex; align-items: center; gap: 7px; }
    #admin-badge svg { width: 13px; height: 13px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes badge-glow {
      0%,100% { box-shadow: 0 4px 16px rgba(201,151,58,0.25); }
      50%      { box-shadow: 0 4px 24px rgba(201,151,58,0.52); }
    }

    /* ══════════════════════════════════════════════
       SEARCH DROPDOWN
    ═════════════════════════════════════════════════ */
    #search-results {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--dropdown-bg); border: 1.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow-lg); display: none; z-index: 999;
      max-height: 280px; overflow-y: auto;
    }
    #search-results.open { display: block; }
    .sr-item { display: flex; align-items: center; gap: 12px; padding: 11px 16px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--dropdown-div); }
    .sr-item:last-child { border-bottom: none; }
    .sr-item:hover { background: var(--dropdown-hover); }
    .sr-icon { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
    .sr-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .sr-meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
    .sr-score { margin-left: auto; font-size: 10px; font-weight: 700; background: var(--gold-soft); color: var(--gold); padding: 2px 8px; border-radius: 50px; flex-shrink: 0; }
    .sr-empty { padding: 18px 16px; font-size: 13px; color: var(--text-secondary); text-align: center; }

    /* ══════════════════════════════════════════════
       LEGEND
    ═════════════════════════════════════════════════ */
    #legend {
      position: absolute; left: 14px; bottom: 226px; z-index: 900;
      background: var(--glass); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; box-shadow: var(--shadow);
    }
    .legend-title { font-size: 9px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.13em; margin-bottom: 9px; }
    .legend-row   { display: flex; align-items: center; gap: 9px; font-size: 11.5px; color: var(--legend-text); margin-bottom: 7px; }
    .legend-row:last-of-type { margin-bottom: 0; }
    .lg-poly {
      width: 16px; height: 11px; flex-shrink: 0; border-radius: 3px;
      background: rgba(204,255,0,0.08);
      border: 2px dashed rgba(204,255,0,0.55);
    }
    .lg-poly-active {
      width: 16px; height: 11px; flex-shrink: 0; border-radius: 3px;
      background: rgba(204,255,0,0.18);
      border: 2px solid #ccff00;
      box-shadow: 0 0 6px rgba(204,255,0,0.30);
    }
    .lg-dot-blue {
      width: 11px; height: 11px; flex-shrink: 0; border-radius: 50%;
      background: var(--blue-dot); border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 6px rgba(25,118,210,0.6);
    }
    .lg-zoom-hint {
      margin-top: 9px; padding-top: 9px;
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .lg-zoom-hint svg { width: 11px; height: 11px; flex-shrink: 0; opacity: 0.55; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ══════════════════════════════════════════════
       FLOATING CONTROLS
    ═════════════════════════════════════════════════ */
    #controls {
      position: absolute; right: 14px; bottom: 226px;
      z-index: 900; display: flex; flex-direction: column; gap: 9px;
    }
    .ctrl-btn {
      width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
      display: grid; place-items: center;
      box-shadow: var(--shadow); transition: transform 0.18s, background 0.2s;
    }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #btn-zi, #btn-zo, #btn-center {
      background: var(--ctrl-bg); border: 1.5px solid var(--ctrl-border); color: var(--ctrl-icon);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    #btn-zi:hover, #btn-zo:hover, #btn-center:hover { background: var(--surface-raised); }
    #btn-locate { background: var(--gold); color: #0e1118; }
    #btn-locate:hover { box-shadow: 0 6px 24px rgba(201,151,58,0.60); }
    #btn-locate.tracking { background: var(--blue-dot); color: #ffffff; box-shadow: 0 6px 24px rgba(25,118,210,0.55); }

    /* ══════════════════════════════════════════════
       PANEL (bottom sheet → sidebar on desktop)
    ═════════════════════════════════════════════════ */
    #panel {
      position: absolute; left: 0; right: 0; bottom: 0;
      z-index: 950; max-height: 84vh;
      transform: translateY(100%); transition: transform 0.38s var(--ease);
      display: flex; flex-direction: column; pointer-events: none;
    }
    #panel.open { transform: translateY(0); pointer-events: all; }

    .panel-inner {
      background: var(--panel-bg); border-radius: 22px 22px 0 0;
      border-top: 1.5px solid var(--border);
      box-shadow: 0 -16px 60px rgba(0,0,0,0.65);
      display: flex; flex-direction: column; overflow: hidden; flex: 1;
    }
    body.light .panel-inner { box-shadow: 0 -6px 30px rgba(13,27,62,0.14); }

    .panel-handle-row { display: flex; justify-content: center; padding: 12px 0 6px; flex-shrink: 0; }
    .panel-handle { width: 38px; height: 4px; border-radius: 2px; background: var(--border); }

    .panel-hero { height: 108px; position: relative; overflow: hidden; flex-shrink: 0; }
    .panel-hero-bg { position: absolute; inset: 0; }
    .panel-hero-pattern {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    /* Neon accent stripe on hero */
    .panel-hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, transparent, var(--neon), transparent);
      opacity: 0.55;
    }
    .panel-hero-content { position: absolute; inset: 0; padding: 14px 18px; display: flex; flex-direction: column; justify-content: flex-end; }
    .panel-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 50px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; width: fit-content; color: #fff; }
    .panel-name   { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #ffffff; line-height: 1.1; }
    .panel-common { font-size: 12px; color: rgba(255,255,255,0.50); margin-top: 3px; }

    .panel-close {
      position: absolute; top: 12px; right: 14px; width: 30px; height: 30px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.30); color: #fff; cursor: pointer; display: grid; place-items: center; z-index: 5; transition: background 0.18s;
    }
    .panel-close:hover { background: rgba(0,0,0,0.50); }

    /* About tab */
    .info-section { margin-bottom: 16px; }
    .info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); margin-bottom: 6px; }
    .info-text  { font-size: 13.5px; color: var(--text-secondary); line-height: 1.75; }

    .action-primary   { background: var(--maroon-b); color: #fff; }
    .action-secondary { background: var(--surface-alt); border: 1.5px solid var(--border); color: var(--text-secondary); }

    /* ══════════════════════════════════════════════

    ═════════════════════════════════════════════════ */
    @media (min-width: 640px) {

      #panel.open { transform: translateX(0); }
      .panel-inner { border-radius: var(--radius-lg); }
      .panel-handle-row { display: none; }
      #legend { bottom: 90px; }
      #controls { bottom: 90px; }
    }

    /* ══════════════════════════════════════════════
       LOCATION ERROR BANNER
    ═════════════════════════════════════════════════ */
    #loc-error {
      position: absolute; bottom: 216px; left: 50%;
      transform: translateX(-50%) translateY(24px);
      z-index: 960; max-width: 320px; width: calc(100% - 40px);
      background: var(--err-bg); border: 1.5px solid var(--err-border); color: var(--err-text);
      padding: 14px 18px; border-radius: var(--radius); font-size: 13px; line-height: 1.58;
      box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
      transition: opacity 0.32s, transform 0.32s; text-align: center;
    }
    #loc-error.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
    #loc-error-close { display: inline-block; margin-top: 9px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; }

    /* ══════════════════════════════════════════════
       TOAST
    ═════════════════════════════════════════════════ */
    #toast {
      position: absolute; bottom: 216px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      z-index: 961; background: var(--toast-bg); color: var(--toast-text);
      padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--toast-border); box-shadow: var(--shadow); opacity: 0;
      pointer-events: none; white-space: nowrap; max-width: calc(100vw - 40px);
      overflow: hidden; text-overflow: ellipsis;
      transition: opacity 0.28s, transform 0.28s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

</head>

      { type:'guide', icon:'📄', title:'Deferral & Leave of Absence Form',   sub:'Academic Affairs Division',             url:'#', badge:'PDF'  },
      { type:'guide', icon:'🔗', title:'Bursary Award Application Portal',   sub:'Student Financial Services',            url:'#', badge:'Link' },
      { type:'guide', icon:'🔗', title:'BUK Student Portal (myBUK)',         sub:'Results, timetables, fee payment',      url:'#', badge:'Link' }
    ]
  }
];

/* ══════════════════════════════════════════════
   BUILDING FOOTPRINTS
   — Placeholder rectangles; refine with Admin Mode
═════════════════════════════════════════════════ */
const bukStructures = [
  { id:'poly-fais',    landmarkId:'fais',    latlngs:[ [11.98165,8.47375],[11.98165,8.47425],[11.98135,8.47425],[11.98135,8.47375] ] },
  { id:'poly-convo',   landmarkId:'convo',   latlngs:[ [11.98025,8.47565],[11.98025,8.47655],[11.97975,8.47655],[11.97975,8.47565] ] },
  { id:'poly-library', landmarkId:'library', latlngs:[ [11.97965,8.47265],[11.97965,8.47345],[11.97930,8.47345],[11.97930,8.47265] ] },
  { id:'poly-sms',     landmarkId:'sms',     latlngs:[ [11.98230,8.47775],[11.98230,8.47865],[11.98170,8.47865],[11.98170,8.47775] ] },
  { id:'poly-vc',      landmarkId:'vc',      latlngs:[ [11.98095,8.47455],[11.98095,8.47520],[11.98062,8.47520],[11.98062,8.47455] ] }
];

/* ══════════════════════════════════════════════
   FUSE.JS  (English-only search index)
═════════════════════════════════════════════════ */
const fuse = new Fuse(
  bukLandmarks.map(l => ({ id:l.id, name:l.name, commonName:l.commonName, category:l.category })),
  { threshold:0.4, includeScore:true,
    keys:[{name:'name',weight:0.40},{name:'commonName',weight:0.35},{name:'category',weight:0.25}] }
);

/* ══════════════════════════════════════════════
   MAP INITIALISATION
   ─────────────────────────────────────────────
   Layer order (bottom → top):
     1. ESRI World Imagery (satellite base)
     2. CartoDB Labels-only pane (roads / place names)
     3. Custom Leaflet panes: polygons, labels, markers
═════════════════════════════════════════════════ */
const BUK_CENTER = [11.9808, 8.4755];
const BUK_ZOOM   = 17;
const LABEL_ZOOM = 16;

const map = L.map('map', { center:BUK_CENTER, zoom:BUK_ZOOM, zoomControl:false });

/* ── Satellite base layer ─────────────────────────── */
const satTiles = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution:'Tiles &copy; <a href="https://www.esri.com">Esri</a>, Maxar, GeoEye, Earthstar Geographics, CNES/Airbus DS, USDA, USGS, AeroGRID, IGN', maxZoom:19 }
).addTo(map);

/* ── Labels overlay — CartoDB Positron Labels only ── */
/* We create a dedicated pane sitting above polygons and markers so that
   road/place labels from the tile server always render on top. */
map.createPane('labelsPane');
map.getPane('labelsPane').style.zIndex = 650;
map.getPane('labelsPane').style.pointerEvents = 'none';

const labelsTiles = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',
  { attribution:'&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd', maxZoom:20, pane:'labelsPane', opacity:0.85 }
).addTo(map);

/* ══════════════════════════════════════════════
   POLYGON STYLE SYSTEM
   Neon yellow (#ccff00) stroke per spec.
   idle   — dashed thin stroke, near-zero fill
   hover  — solid stroke, light fill
   active — solid stroke + glow, richer fill
═════════════════════════════════════════════════ */
const NEON = '#ccff00';

function polyIdle()   { return { color:NEON, fillColor:NEON, fillOpacity:0.04, opacity:0.35, weight:2,   dashArray:'6 4', lineJoin:'round' }; }
function polyHover()  { return { color:NEON, fillColor:NEON, fillOpacity:0.14, opacity:0.90, weight:2.5, dashArray:null,  lineJoin:'round' }; }
function polyActive() { return { color:NEON, fillColor:NEON, fillOpacity:0.22, opacity:1,    weight:3,   dashArray:null,  lineJoin:'round' }; }

/* Inject tooltip CSS */
const _ttCSS = document.createElement('style');
_ttCSS.textContent = `.buk-tt{background:var(--surface)!important;border:1.5px solid var(--border)!important;color:var(--text-primary)!important;border-radius:9px!important;padding:5px 12px!important;box-shadow:var(--shadow)!important;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;pointer-events:none}.buk-tt::before{display:none!important}`;
document.head.appendChild(_ttCSS);

/* Build polygon layers */
let activeId     = null;
let activeMarker = null;
const polyLayers = [];

bukStructures.forEach(s => {
  const lm = bukLandmarks.find(x => x.id === s.landmarkId);
  if (!lm) return;
  const poly = L.polygon(s.latlngs, polyIdle()).addTo(map);
  poly.bindTooltip(lm.commonName, { sticky:true, className:'buk-tt', opacity:1 });
  poly.on('mouseover', () => { if (activeId !== lm.id) poly.setStyle(polyHover()); });
  poly.on('mouseout',  () => { if (activeId !== lm.id) poly.setStyle(polyIdle()); });
  poly.on('click',     e => { L.DomEvent.stopPropagation(e); activateBuilding(lm, 'click'); });
  polyLayers.push({ poly, landmark:lm });
});

/* ══════════════════════════════════════════════
   MARKER ICONS
═════════════════════════════════════════════════ */
function entranceDotIcon(color) {
  return L.divIcon({
    html: `<div class="entrance-dot" style="background:${color}"></div>`,
    className:'', iconSize:[12,12], iconAnchor:[6,6]
  });
}

function searchPulseIcon(color) {
  return L.divIcon({
    html: `<div class="sp-wrap">
             <div class="sp-ring" style="background:${color}44"></div>
             <div class="sp-core" style="background:${color}"></div>
           </div>`,
    className:'', iconSize:[18,18], iconAnchor:[9,9]
  });
}

/* ══════════════════════════════════════════════
   ACTIVATE / DEACTIVATE BUILDING
   source = 'click'  → static entrance dot
   source = 'search' → pulsing ring
═════════════════════════════════════════════════ */
function _deactivateCurrentPoly() {
  if (!activeId) return;
  const e = polyLayers.find(p => p.landmark.id === activeId);
  if (e) e.poly.setStyle(polyIdle());
}

function activateBuilding(lm, source) {
  _deactivateCurrentPoly();
  activeId = lm.id;

  const entry = polyLayers.find(p => p.landmark.id === lm.id);
  if (entry) entry.poly.setStyle(polyActive());

  if (activeMarker) { map.removeLayer(activeMarker); activeMarker = null; }
  const coord = [lm.entranceCoord.lat, lm.entranceCoord.lng];
  const icon  = source === 'search' ? searchPulseIcon(lm.color) : entranceDotIcon(lm.color);
  activeMarker = L.marker(coord, { icon, zIndexOffset:600, interactive:false }).addTo(map);

  populatePanel(lm);
  setTab('about');
  panel.classList.add('open');
  map.flyTo(coord, Math.max(map.getZoom(), 18), { duration:0.80 });
}

/* ══════════════════════════════════════════════
   ZOOM-DEPENDENT BUILDING LABELS
   Labels use a heavy black halo for satellite contrast.
═════════════════════════════════════════════════ */
const labelGroup = L.layerGroup();
const labelDivs  = [];

function buildLabels() {
  labelGroup.clearLayers();
  labelDivs.length = 0;
  bukLandmarks.forEach(lm => {
    const div = document.createElement('div');
    div.className = 'buk-label';
    div.textContent = lm.commonName;
    const icon = L.divIcon({ html:div, className:'buk-label-wrap', iconSize:null, iconAnchor:[0,0] });
    L.marker(lm.labelCoord, { icon, interactive:false, zIndexOffset:-200 }).addTo(labelGroup);
    labelDivs.push(div);
  });
}

function setLabelsVisible(v) { labelDivs.forEach(d => d.classList.toggle('visible', v)); }

function updateLabelVisibility() {
  const show     = map.getZoom() >= LABEL_ZOOM;
  const isOnMap  = map.hasLayer(labelGroup);
  document.getElementById('zoom-hint').style.display = show ? 'none' : 'flex';
  if (show && !isOnMap) {
    labelGroup.addTo(map);
    requestAnimationFrame(() => requestAnimationFrame(() => setLabelsVisible(true)));
  } else if (!show && isOnMap) {
    setLabelsVisible(false);
    setTimeout(() => { if (map.getZoom() < LABEL_ZOOM) map.removeLayer(labelGroup); }, 380);
  }
}

map.on('zoomend', updateLabelVisibility);
buildLabels();
labelGroup.addTo(map);
requestAnimationFrame(() => requestAnimationFrame(() => setLabelsVisible(true)));
document.getElementById('zoom-hint').style.display = 'none';

/* ══════════════════════════════════════════════
   ADMIN MODE (?edit=true)
   Coordinate picker — gold pin + clipboard copy
═════════════════════════════════════════════════ */
const ADMIN_MODE = new URLSearchParams(window.location.search).get('edit') === 'true';
if (ADMIN_MODE) {
  document.body.classList.add('admin-mode');
  document.getElementById('admin-badge').classList.add('visible');
  let adminPin = null;
  map.on('click', e => {
    const lat   = e.latlng.lat.toFixed(6);
    const lng   = e.latlng.lng.toFixed(6);
    const coord = `[${lat}, ${lng}]`;
    const icon  = L.divIcon({ html:'<div class="admin-pin"></div>', className:'', iconSize:[12,12], iconAnchor:[6,6] });
    if (adminPin) map.removeLayer(adminPin);
    adminPin = L.marker([e.latlng.lat, e.latlng.lng], { icon, zIndexOffset:2000 }).addTo(map);
    navigator.clipboard.writeText(coord).catch(()=>{});
    showToast(`📋 Copied: ${coord}`);
  });
}

/* ══════════════════════════════════════════════
   LIVE LOCATION — Blue Dot + Accuracy Circle
   Blue dot is the only permanent map element.
═════════════════════════════════════════════════ */
let blueDot=null, accCircle=null, watchId=null, firstFix=true;

function blueDotIcon() {
  return L.divIcon({
    html:`<div class="bd-wrap"><div class="bd-ring"></div><div class="bd-core"></div></div>`,
    className:'', iconSize:[20,20], iconAnchor:[10,10]
  });
}
function onPosition(pos) {
  const { latitude:lat, longitude:lng, accuracy } = pos.coords;
  if (!blueDot) {
    blueDot   = L.marker([lat,lng], { icon:blueDotIcon(), zIndexOffset:1000 }).addTo(map);
    accCircle = L.circle([lat,lng], { radius:accuracy, color:'#1976d2', fillColor:'#1976d2', fillOpacity:0.07, weight:1.5, dashArray:'5 4' }).addTo(map);
  } else {
    blueDot.setLatLng([lat,lng]);
    accCircle.setLatLng([lat,lng]);
    accCircle.setRadius(accuracy);
  }
  if (firstFix) { map.flyTo([lat,lng], 18, { duration:1.1 }); showToast('📍 You are here!'); firstFix=false; }
  else showToast('Position updated.');
}
function onPositionError(err) {
  const msgs = { 1:'Location access denied. Enable permissions in browser settings.', 2:'Location unavailable. Make sure GPS is enabled.', 3:'Location timed out. Please try again.' };
  showLocError(msgs[err.code] || 'Location unavailable.');
  stopTracking();
}
function startTracking() {
  if (!navigator.geolocation) { showLocError('Your browser does not support geolocation.'); return; }
  firstFix = true;
  showToast('Searching for your location…');
  document.getElementById('btn-locate').classList.add('tracking');
  watchId = navigator.geolocation.watchPosition(onPosition, onPositionError, { enableHighAccuracy:true, timeout:12000, maximumAge:3000 });
}
function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  document.getElementById('btn-locate').classList.remove('tracking');
}
document.getElementById('btn-locate').addEventListener('click', () => {
  if (watchId !== null) { stopTracking(); showToast('Live tracking stopped.'); } else startTracking();
});

/* ══════════════════════════════════════════════
   CENTRE MAP
═════════════════════════════════════════════════ */
document.getElementById('btn-center').addEventListener('click', () => {
  map.flyTo(BUK_CENTER, BUK_ZOOM, { duration:0.9 });
  showToast('Centred on BUK Old Site.');
});

/* ══════════════════════════════════════════════
   LOCATION ERROR BANNER
═════════════════════════════════════════════════ */
let errTimer;
function showLocError(msg) {
  const b = document.getElementById('loc-error');
  document.getElementById('loc-error-msg').textContent = msg;
  b.classList.add('show');
  clearTimeout(errTimer);
  errTimer = setTimeout(() => b.classList.remove('show'), 9000);
}
document.getElementById('loc-error-close').addEventListener('click',  () => document.getElementById('loc-error').classList.remove('show'));
document.getElementById('loc-error-close').addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') document.getElementById('loc-error').classList.remove('show'); });

/* ══════════════════════════════════════════════
   PANEL — populate, close, tab switching
═════════════════════════════════════════════════ */
const panel = document.getElementById('panel');

function buildResourcesHTML(resources) {
  if (!resources || !resources.length) {
    return `<div class="res-empty">No resources available yet for this location.</div>`;
  }
  const handouts = resources.filter(r => r.type === 'handout');
  const pqs      = resources.filter(r => r.type === 'pq');
  const guides   = resources.filter(r => r.type === 'guide');
  let html = '';
  if (handouts.length) {
    html += `<div class="res-section-title">📄 Handouts & Lecture Notes</div><div class="res-list">`;
    handouts.forEach(r => {
      html += `<a class="res-item" href="${r.url}" target="_blank" rel="noopener">
        <div class="res-icon handout">${r.icon}</div>
        <div style="flex:1;min-width:0"><div class="res-title">${r.title}</div><div class="res-sub">${r.sub}</div></div>
        <span class="res-badge pdf">${r.badge}</span></a>`;
    });
    html += '</div>';
  }
  if (pqs.length) {
    html += `<div class="res-section-title" style="margin-top:14px">📝 Past Questions</div><div class="res-list">`;
    pqs.forEach(r => {
      html += `<a class="res-item" href="${r.url}" target="_blank" rel="noopener">
        <div class="res-icon pq">${r.icon}</div>
        <div style="flex:1;min-width:0"><div class="res-title">${r.title}</div><div class="res-sub">${r.sub}</div></div>
        <span class="res-badge pdf">${r.badge}</span></a>`;
    });
    html += '</div>';
  }
  if (guides.length) {
    html += `<div class="res-section-title" style="margin-top:14px">🔗 Guides & Portals</div><div class="res-list">`;
    guides.forEach(r => {
      const badgeClass = r.badge === 'Link' ? 'link' : 'pdf';
      html += `<a class="res-item" href="${r.url}" target="_blank" rel="noopener">
        <div class="res-icon guide">${r.icon}</div>
        <div style="flex:1;min-width:0"><div class="res-title">${r.title}</div><div class="res-sub">${r.sub}</div></div>
        <span class="res-badge ${badgeClass}">${r.badge}</span></a>`;
    });
    html += '</div>';
  }
  return html;
}

function populatePanel(lm) {
  document.getElementById('panel-name').textContent   = lm.name;
  document.getElementById('panel-common').textContent = lm.commonName;
  document.getElementById('panel-desc').textContent   = lm.desc;
  document.getElementById('panel-students').textContent = lm.students;
  const badge = document.getElementById('panel-badge');
  badge.textContent = `${lm.emoji}  ${lm.category}`;
  badge.style.cssText = `background:${lm.color}28;color:#fff;border:1px solid ${lm.color}70;`;
  document.getElementById('panel-hero-bg').style.background = lm.heroBg;
  document.getElementById('panel-facts').innerHTML = lm.facts.map(f =>
    `<div class="fact-chip"><div class="fact-chip-label">${f.label}</div><div class="fact-chip-value">${f.value}</div></div>`
  ).join('');
  document.getElementById('panel-resources').innerHTML = buildResourcesHTML(lm.resources);
}

function closePanel() {
  panel.classList.remove('open');
  _deactivateCurrentPoly();
  activeId = null;
  if (activeMarker) { map.removeLayer(activeMarker); activeMarker = null; }
}

document.getElementById('panel-close').addEventListener('click', closePanel);
if (!ADMIN_MODE) {
  map.on('click', () => { if (panel.classList.contains('open')) closePanel(); });
}

function setTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
}
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => setTab(btn.dataset.tab)));

/* ══════════════════════════════════════════════
   SEARCH — Fuse.js live fuzzy search
   Search result click drops gold pulse marker.
═════════════════════════════════════════════════ */
const searchInput = document.getElementById('search-input');
const searchBox   = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchBox.innerHTML = '';
  if (!q) { searchBox.classList.remove('open'); return; }
  const results = fuse.search(q).slice(0, 6);
  if (!results.length) {
    searchBox.innerHTML = `<div class="sr-empty">No buildings found. Try a different spelling.</div>`;
    searchBox.classList.add('open');
    return;
  }
  results.forEach(({ item, score }) => {
    const lm  = bukLandmarks.find(x => x.id === item.id);
    if (!lm) return;
    const pct = Math.round((1 - score) * 100);
    const div = document.createElement('div');
    div.className = 'sr-item';
    div.innerHTML = `<div class="sr-icon" style="background:${lm.color}1e">${lm.emoji}</div>
      <div style="flex:1;min-width:0">
        <div class="sr-name">${lm.name}</div>
        <div class="sr-meta">${lm.category} · ${lm.commonName}</div>
      </div>
      <div class="sr-score">${pct}%</div>`;
    div.addEventListener('click', () => {
      searchInput.value = lm.name;
      searchBox.classList.remove('open');
      activateBuilding(lm, 'search');
    });
    searchBox.appendChild(div);
  });
  searchBox.classList.add('open');
});

document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchBox.contains(e.target)) searchBox.classList.remove('open');
});

/* ══════════════════════════════════════════════
   THEME TOGGLE — UI panels only
   Satellite tiles do not change; only CSS vars flip.
═════════════════════════════════════════════════ */
let isLight = false;
const themeIcon = document.getElementById('theme-icon');
const SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

document.getElementById('theme-btn').addEventListener('click', () => {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  themeIcon.innerHTML = isLight ? SUN : MOON;
  /* Satellite tiles stay as-is.
     CSS var --map-overlay transitions from dark tint to transparent. */
});

/* ══════════════════════════════════════════════
   ZOOM CONTROLS
═════════════════════════════════════════════════ */
document.getElementById('btn-zi').addEventListener('click', () => map.zoomIn());
document.getElementById('btn-zo').addEventListener('click', () => map.zoomOut());

/* ══════════════════════════════════════════════
   ACTION BUTTONS
═════════════════════════════════════════════════ */
['btn-navigate','btn-navigate2','btn-navigate3','btn-navigate4']
  .forEach(id => document.getElementById(id)?.addEventListener('click', () => showToast('GPS routing coming soon!')));
['btn-share','btn-share2','btn-share3']
  .forEach(id => document.getElementById(id)?.addEventListener('click', () => {
    navigator.clipboard?.writeText(location.href).catch(()=>{});
    showToast('Link copied to clipboard!');
  }));
document.getElementById('btn-save')?.addEventListener('click', () => showToast('Location bookmarked!'));

/* ══════════════════════════════════════════════
   TOAST
═════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
</body>
</html>
